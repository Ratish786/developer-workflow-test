name: Developer Workflow Pipeline

on:
  push:
    branches:
      - main

jobs:
  process-job:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Workflow Engine
        run: python scripts/process_job.py